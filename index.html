<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finanças do Casal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'DM Sans',system-ui,sans-serif;
  --bg:#f7f6f3;--surface:#fff;--surface2:#f1f0ec;
  --border:#e4e2db;--border2:#d0cec6;
  --text:#1a1917;--text2:#6b6960;--text3:#9b9890;
  --accent:#1D9E75;--accent-light:#e1f5ee;--accent-dark:#0f6e56;
  --danger:#e24b4a;--danger-light:#fcebeb;
  --warn:#ba7517;--warn-light:#faeeda;
  --info:#378add;--info-light:#e6f1fb;
  --purple:#7f77dd;--purple-light:#eeedfe;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1b19;--surface2:#252421;
  --border:#2e2d2a;--border2:#3d3c38;
  --text:#f0ede8;--text2:#a09d96;--text3:#6b6860;
  --accent-light:#0d3326;--danger-light:#2d1414;
  --warn-light:#2a1d08;--info-light:#0d1f35;--purple-light:#1a1840;
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font)}

/* ── Login ── */
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px}
#login-screen.visible{display:flex}
.login-box{width:100%;max-width:380px}
.login-logo{width:48px;height:48px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:600;margin:0 auto 16px}
.login-title{font-size:20px;font-weight:500;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
.login-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:24px}

/* ── App layout ── */
#app{display:none;min-height:100vh}
#app.visible{display:flex}
aside{width:220px;flex-shrink:0;background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
main{flex:1;padding:28px 32px;min-width:0}
@media(max-width:700px){
  #app.visible{flex-direction:column}
  aside{width:100%;height:auto;position:relative;border-right:none;border-bottom:.5px solid var(--border)}
  main{padding:16px}
}

/* ── Nav ── */
.nav-logo{padding:16px;border-bottom:.5px solid var(--border)}
.nav-logo .name{font-size:15px;font-weight:500}
.nav-logo .sub{font-size:11px;color:var(--text2);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;transition:background .12s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{border-left-color:var(--accent);background:var(--surface2);color:var(--accent-dark);font-weight:500}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-footer{padding:12px 16px;border-top:.5px solid var(--border);margin-top:auto}
.user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--accent-dark);flex-shrink:0}

/* ── Components ── */
.page-title{font-size:18px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:16px}
.section-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--surface2);border-radius:var(--r);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);font-weight:500;padding:6px 10px;border-bottom:.5px solid var(--border);text-align:left}
td{padding:9px 10px;border-bottom:.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--r)}
.b-ok{background:var(--accent-light);color:var(--accent-dark)}
.b-warn{background:var(--warn-light);color:var(--warn)}
.b-danger{background:var(--danger-light);color:var(--danger)}
.b-info{background:var(--info-light);color:var(--info)}
.alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:10px;line-height:1.5}
.a-ok{background:var(--accent-light);color:var(--accent-dark);border-left:3px solid var(--accent)}
.a-warn{background:var(--warn-light);color:var(--warn);border-left:3px solid var(--warn)}
.a-danger{background:var(--danger-light);color:var(--danger);border-left:3px solid var(--danger)}
.a-info{background:var(--info-light);color:var(--info);border-left:3px solid var(--info)}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border)}
.row-item:last-child{border-bottom:none}
.row-label{font-size:13px;color:var(--text2)}
.row-value{font-size:13px;font-weight:500}
.pbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.p-green{background:var(--accent)}.p-amber{background:var(--warn)}.p-red{background:var(--danger)}.p-blue{background:var(--info)}.p-purple{background:var(--purple)}
.input{width:100%;padding:8px 12px;font-size:13px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);transition:border-color .15s}
.input:focus{outline:none;border-color:var(--accent)}
.field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field-row label{font-size:12px;color:var(--text2)}
.btn{padding:8px 16px;font-size:13px;font-weight:500;border:.5px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text);cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:12px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl);padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;border:.5px solid var(--border)}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text2);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="visible">
  <div class="login-box">
    <div class="login-logo">₢</div>
    <div class="login-title">Finanças do Casal</div>
    <div class="login-sub">Entre com sua conta para acessar</div>
    <div class="login-card">
      <div class="field-row">
        <label>E-mail</label>
        <input class="input" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="field-row">
        <label>Senha</label>
        <input class="input" type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')window.doLogin()"/>
      </div>
      <div class="err" id="login-err"></div>
      <button class="btn btn-primary" id="login-btn" onclick="window.doLogin()" style="width:100%;justify-content:center;margin-top:8px;padding:10px">
        Entrar
      </button>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text3);margin-top:16px">Acesso restrito ao casal. Conta criada pelo administrador.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside>
    <div class="nav-logo">
      <div class="name">Finanças do Casal</div>
      <div class="sub" id="nav-month"></div>
    </div>
    <nav id="nav"></nav>
    <div class="nav-footer">
      <div class="user-row">
        <div class="avatar" id="user-avatar">?</div>
        <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="user-name">—</div>
      </div>
      <button class="btn btn-sm" onclick="window.doLogout()" style="width:100%;justify-content:center">Sair</button>
    </div>
  </aside>
  <main id="main"><div class="loading"><div class="spinner"></div>Carregando...</div></main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
['doLogin','doLogout','goPage','openModal','closeModal','saveModal','deleteItem',
 'updateStatus','openEditModal','saveEditModal','saveFinanciamento','saveConsorcio',
 'saveReserva','atualizarCatCartao','updateLance','calcViagem','importarArquivos',
 'setFiltroAnalise','recategorizar','removerLancamento','limparDuplicatas',
 'limparDados','salvarNoFirebase'
].forEach(fn=>{if(!window[fn])window[fn]=(...a)=>console.warn(fn+' not ready')})
</script>
<!-- FIREBASE SDK -->
<script type="module">
// ─── CONFIGURAÇÃO ─────────────────────────────────────────────────────────────
// 1. Acesse console.firebase.google.com
// 2. Crie um projeto → adicione um app Web
// 3. Copie o firebaseConfig e cole aqui substituindo os valores abaixo
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'
import { getFirestore, doc, getDoc, setDoc, collection,
         getDocs, addDoc, deleteDoc, updateDoc, query, where, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'

const firebaseConfig = {
  apiKey: "AIzaSyCJ5cGxEFHp4tf6Pao7FRAOOXi6_Lxhhm0",
  authDomain: "house-budget-8b2b6.firebaseapp.com",
  projectId: "house-budget-8b2b6",
  storageBucket: "house-budget-8b2b6.firebasestorage.app",
  messagingSenderId: "996458516516",
  appId: "1:996458516516:web:0863c29d834244a75d48b1"
}

const firebaseApp = initializeApp(firebaseConfig)
const auth        = getAuth(firebaseApp)
const db          = getFirestore(firebaseApp)

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
const fmt    = v => 'R$ ' + Math.round(Number(v)||0).toLocaleString('pt-BR')
const fmtPct = v => (Number(v)||0).toFixed(1)+'%'
const currentMonth = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` }
const calcSAC = (s,ta,n) => {
  const tm=ta/12/100, amor=s/n, p1=amor+s*tm, pn=amor+amor*tm
  let tj=0; for(let i=0;i<n;i++) tj+=(s-i*amor)*tm
  return {p1,pn,total:s+tj,juros:tj}
}
const loadingHTML = (msg='Carregando...') => `<div class="loading"><div class="spinner"></div>${msg}</div>`
const toast = (msg, ok=true) => {
  const d=document.createElement('div')
  d.style.cssText=`position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;background:${ok?'var(--accent)':'var(--danger)'};color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15)`
  d.textContent=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2500)
}

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let state = { renda:[],contas:[],financiamento:{},consorcio:{},cartao:[],viagens:[],reserva:{},mobilia:[] }
let currentUser = null
let currentModal = null

// ─── AUTH ─────────────────────────────────────────────────────────────────────
window.doLogin = async () => {
  const email  = document.getElementById('login-email').value.trim()
  const senha  = document.getElementById('login-senha').value
  const btn    = document.getElementById('login-btn')
  const errEl  = document.getElementById('login-err')
  errEl.textContent = ''
  btn.disabled = true; btn.textContent = 'Entrando...'
  try {
    await signInWithEmailAndPassword(auth, email, senha)
  } catch(e) {
    errEl.textContent = 'E-mail ou senha incorretos.'
    btn.disabled = false; btn.textContent = 'Entrar'
  }
}

window.doLogout = async () => { await signOut(auth) }

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user
    document.getElementById('login-screen').classList.remove('visible')
    document.getElementById('app').classList.add('visible')
    const initials = user.email.slice(0,2).toUpperCase()
    document.getElementById('user-avatar').textContent = initials
    document.getElementById('user-name').textContent = user.email.split('@')[0]
    buildNav()
    await goPage('dashboard')
  } else {
    currentUser = null
    document.getElementById('login-screen').classList.add('visible')
    document.getElementById('app').classList.remove('visible')
    document.getElementById('login-btn').disabled = false
    document.getElementById('login-btn').textContent = 'Entrar'
  }
})

// ─── FIRESTORE HELPERS ────────────────────────────────────────────────────────
// Dados compartilhados ficam sob /casal/dados/[collection]
const col  = name => collection(db, 'casal', 'dados', name)
const singleDoc = name => doc(db, 'casal', 'config', name, 'v1')

async function loadAll() {
  const mes = currentMonth()
  const [renda, contas, cartao, viagens, mobilia, fin, cons, res] = await Promise.all([
    getDocs(query(col('renda'),    where('mes','==',mes))),
    getDocs(query(col('contas'),   where('mes','==',mes))),
    getDocs(col('cartao')),
    getDocs(col('viagens')),
    getDocs(col('mobilia')),
    getDoc(singleDoc('financiamento')),
    getDoc(singleDoc('consorcio')),
    getDoc(singleDoc('reserva')),
  ])
  state.renda       = renda.docs.map(d=>({id:d.id,...d.data()}))
  state.contas      = contas.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.dia-b.dia)
  state.cartao      = cartao.docs.map(d=>({id:d.id,...d.data()}))
  state.viagens     = viagens.docs.map(d=>({id:d.id,...d.data()}))
  state.mobilia     = mobilia.docs.map(d=>({id:d.id,...d.data()}))
  state.financiamento = fin.exists() ? fin.data() : {credor:'Construtora',saldo:320000,parcela:3800,taxa:4,prazo:180,indexador:'CUB/SC'}
  state.consorcio   = cons.exists() ? cons.data() : {credito:80000,saldo:55000,parcela:1100,admin:'Porto Seguro',grupo:'412',cota:'47',mesesTotal:80,mesesPagos:31,taxaAdm:14,proximaAssembleia:'2026-04-12',contemplado:false}
  state.reserva     = res.exists() ? res.data() : {saldo:18000,meta:38400,aporte:860,tipo:'CDB liquidez diária'}

  // Seed automático se estiver vazio
  if(state.renda.length===0) await seedDados()
}

async function seedDados() {
  const mes = currentMonth()
  const rendas = [
    {desc:'Salário Lucas',valor:8000,owner:'Lucas',mes},
    {desc:'Salário Esposa',valor:5500,owner:'Esposa',mes},
    {desc:'Outros',valor:300,owner:'Outros',mes},
  ]
  const contas = [
    {nome:'Condomínio',cat:'casa',valor:480,dia:28,status:'pendente',mes},
    {nome:'Energia (CELESC)',cat:'casa',valor:180,dia:10,status:'pago',mes},
    {nome:'Água (CASAN)',cat:'casa',valor:90,dia:15,status:'pago',mes},
    {nome:'Internet (Vivo)',cat:'casa',valor:120,dia:5,status:'pago',mes},
    {nome:'IPTU (parcela)',cat:'casa',valor:65,dia:10,status:'pendente',mes},
    {nome:'Seguro residencial',cat:'casa',valor:45,dia:1,status:'pago',mes},
    {nome:'Fatura cartão XP',cat:'cartao',valor:2100,dia:27,status:'pendente',mes},
    {nome:'Consórcio Porto Seguro',cat:'consorcio',valor:1100,dia:20,status:'pago',mes},
    {nome:'Fundo de reserva',cat:'reserva',valor:860,dia:5,status:'pago',mes},
    {nome:'Fundo de viagens',cat:'viagem',valor:500,dia:5,status:'pago',mes},
  ]
  const cartao = [
    {descricao:'Supermercado',cat:'Alimentação',valor:480,data:'2026-03-05'},
    {descricao:'iFood (6x)',cat:'Alimentação',valor:210,data:'2026-03-10'},
    {descricao:'Farmácia',cat:'Saúde',valor:95,data:'2026-03-08'},
    {descricao:'Shopee / Amazon',cat:'Casa',valor:340,data:'2026-03-12'},
    {descricao:'Netflix + Spotify',cat:'Lazer',valor:85,data:'2026-03-01'},
    {descricao:'Roupas',cat:'Pessoal',valor:320,data:'2026-03-15'},
    {descricao:'Combustível',cat:'Transporte',valor:280,data:'2026-03-18'},
    {descricao:'Outros',cat:'Variado',valor:290,data:'2026-03-20'},
  ]
  const viagens = [
    {dest:'Litoral SC',dataViagem:'2026-07-15',orcamento:3500,economizado:3000,status:'economizando'},
    {dest:'Buenos Aires',dataViagem:'2026-11-10',orcamento:5500,economizado:0,status:'planejando'},
    {dest:'Europa',dataViagem:'2027-06-01',orcamento:18000,economizado:0,status:'planejando'},
  ]
  const mobilia = [
    {item:'Sofá + sala',valor:3500,prioridade:'alta',status:'pesquisando'},
    {item:'Cama + colchão',valor:2800,prioridade:'alta',status:'pesquisando'},
    {item:'Ar-condicionado (2x)',valor:4200,prioridade:'alta',status:'orçando'},
    {item:'Mesa de jantar',valor:1200,prioridade:'media',status:'aguardando'},
    {item:'Cortinas',valor:900,prioridade:'media',status:'aguardando'},
  ]
  await Promise.all([
    ...rendas.map(r => addDoc(col('renda'), r)),
    ...contas.map(c => addDoc(col('contas'), c)),
    ...cartao.map(c => addDoc(col('cartao'), c)),
    ...viagens.map(v => addDoc(col('viagens'), v)),
    ...mobilia.map(m => addDoc(col('mobilia'), m)),
    setDoc(singleDoc('financiamento'), {credor:'Construtora',saldo:320000,parcela:3800,taxa:4,prazo:180,indexador:'CUB/SC'}),
    setDoc(singleDoc('consorcio'), {credito:80000,saldo:55000,parcela:1100,admin:'Porto Seguro',grupo:'412',cota:'47',mesesTotal:80,mesesPagos:31,taxaAdm:14,proximaAssembleia:'2026-04-12',contemplado:false}),
    setDoc(singleDoc('reserva'), {saldo:18000,meta:38400,aporte:860,tipo:'CDB liquidez diária'}),
  ])
  await loadAll()
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
const navPages = [
  {id:'dashboard',icon:'◈',label:'Painel geral'},
  {id:'orcamento',icon:'◉',label:'Orçamento'},
  {id:'financiamento',icon:'⌂',label:'Financiamento'},
  {id:'cartao',icon:'▬',label:'Cartão de crédito'},
  {id:'casa',icon:'◎',label:'Contas da casa'},
  {id:'consorcio',icon:'◷',label:'Consórcio'},
  {id:'viagens',icon:'◁',label:'Viagens'},
  {id:'reserva',icon:'◆',label:'Fundo de reserva'},
  {id:'analise',icon:'◑',label:'Análise de cartões'},
  {id:'tutorial',icon:'?',label:'Tutorial'},
]

function buildNav() {
  const d=new Date()
  document.getElementById('nav-month').textContent=MONTHS[d.getMonth()]+' '+d.getFullYear()
  document.getElementById('nav').innerHTML=navPages.map(p=>
    `<div class="nav-item" id="nav-${p.id}" onclick="goPage('${p.id}')">
      <span class="nav-icon">${p.icon}</span>${p.label}
    </div>`).join('')
}

window.goPage = async (id) => {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  document.getElementById('nav-'+id)?.classList.add('active')
  document.getElementById('main').innerHTML = loadingHTML()
  await loadAll()
  const renders = {
    dashboard:renderDashboard, orcamento:renderOrcamento,
    financiamento:renderFinanciamento, cartao:renderCartao,
    casa:renderCasa, consorcio:renderConsorcio,
    viagens:renderViagens, reserva:renderReserva,
    analise:renderAnalise,
    tutorial:renderTutorial,
  }
  document.getElementById('main').innerHTML = renders[id]?.() || ''
  window.scrollTo(0,0)
  if(id==='consorcio') updateLance()
  if(id==='viagens') calcViagem()
}

function renderDashboard() {
  const totalRenda  = state.renda.reduce((s,r)=>s+Number(r.valor),0)
  const fin         = Number(state.financiamento?.parcela||0)
  const totalContas = state.contas.reduce((s,c)=>s+Number(c.valor),0) + fin
  const livre = totalRenda - totalContas
  const pct   = totalRenda>0 ? totalContas/totalRenda*100 : 0
  const cats  = [
    {l:'Financiamento',v:fin,c:'p-red'},
    {l:'Cartão',v:bycat('cartao'),c:'p-amber'},
    {l:'Consórcio',v:bycat('consorcio'),c:'p-blue'},
    {l:'Contas casa',v:bycat('casa'),c:'p-green'},
    {l:'Reserva',v:bycat('reserva'),c:'p-purple'},
    {l:'Viagens',v:bycat('viagem'),c:'p-blue'},
  ].filter(d=>d.v>0)
  const alertas = state.contas.filter(c=>c.status==='pendente'||c.status==='atrasado')
  return `
  <div class="page-title">Painel geral</div>
  <div class="page-sub">${MONTHS[new Date().getMonth()]} ${new Date().getFullYear()}</div>
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Renda líquida</div><div class="metric-value" style="color:var(--accent)">${fmt(totalRenda)}</div><div class="metric-sub">mensal</div></div>
    <div class="metric-card"><div class="metric-label">Comprometido</div><div class="metric-value" style="color:${pct>70?'var(--danger)':'var(--warn)'}">${fmt(totalContas)}</div><div class="metric-sub">${fmtPct(pct)} da renda</div></div>
    <div class="metric-card"><div class="metric-label">Saldo livre</div><div class="metric-value" style="color:${livre<0?'var(--danger)':'var(--text)'}">${fmt(livre)}</div><div class="metric-sub">${fmtPct(100-pct)} da renda</div></div>
    <div class="metric-card"><div class="metric-label">Fundo de reserva</div><div class="metric-value" style="color:var(--info)">${fmt(state.reserva?.saldo||0)}</div><div class="metric-sub">meta: ${fmt(state.reserva?.meta||0)}</div></div>
  </div>
  ${pct>70?'<div class="alert a-warn">Comprometimento acima de 70% — margem apertada para imprevistos.</div>':''}
  <div class="two-col">
    <div class="card">
      <div class="section-title">Distribuição de gastos</div>
      ${cats.map(d=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:13px">${d.l}</span><span style="font-size:12px;font-weight:500">${fmt(d.v)}</span>
        </div>
        <div class="pbar"><div class="pfill ${d.c}" style="width:${Math.min(100,d.v/totalContas*100).toFixed(0)}%"></div></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="section-title">Contas pendentes</div>
      ${alertas.length===0
        ? '<div class="alert a-ok">Todas as contas em dia!</div>'
        : alertas.map(c=>`<div class="alert ${c.status==='atrasado'?'a-danger':'a-warn'}" style="margin-bottom:8px">${c.nome} — ${fmt(c.valor)} · dia ${c.dia}</div>`).join('')}
      <div class="alert a-ok" style="margin-top:8px">Reserva: ${fmtPct((state.reserva?.saldo||0)/(state.reserva?.meta||1)*100)} da meta</div>
    </div>
  </div>
  <div class="card">
    <div class="section-title">Resumo por categoria</div>
    <div class="tbl-wrap"><table>
      <tr><th>Categoria</th><th>Valor</th><th>% renda</th><th>Status</th></tr>
      ${[
        {l:'Financiamento',v:fin,t:30},
        {l:'Cartão de crédito',v:bycat('cartao'),t:18},
        {l:'Contas da casa',v:bycat('casa'),t:12},
        {l:'Consórcio',v:bycat('consorcio'),t:10},
        {l:'Viagens',v:bycat('viagem'),t:5},
        {l:'Fundo de reserva',v:bycat('reserva'),t:10},
      ].filter(r=>r.v>0).map(r=>{
        const p=totalRenda>0?r.v/totalRenda*100:0
        const b=p>r.t?'b-danger':p>r.t*.8?'b-warn':'b-ok'
        return `<tr><td>${r.l}</td><td>${fmt(r.v)}</td><td>${fmtPct(p)}</td><td><span class="badge ${b}">${p>r.t?'Alto':p>r.t*.8?'Atenção':'OK'}</span></td></tr>`
      }).join('')}
      <tr><td><strong>Total</strong></td><td><strong>${fmt(totalContas)}</strong></td><td><strong>${fmtPct(pct)}</strong></td><td></td></tr>
    </table></div>
  </div>`
}

function categorizarAuto(desc) {
  const d=(desc||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  for(const [cat,kws] of Object.entries(CATEGORIAS)) if(kws.some(k=>d.includes(k))) return cat
  return 'Outros'
}

function splitCSV(line) {
  const cols=[]; let cur='', inQ=false
  for(let i=0;i<line.length;i++){
    const ch=line[i]
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur=''}
    else cur+=ch
  }
  cols.push(cur.trim()); return cols
}

function parsarCSV(texto, banco) {
  const ls=texto.trim().split('\n').map(l=>l.replace(/\r/,''))
  // Helper: parse DD/MM/YYYY or YYYY-MM-DD to YYYY-MM-DD
  function parseData(s) {
    s = (s||'').trim()
    if(!s) return ''
    if(s.includes('/')) {
      const p=s.split('/');
      if(p.length===3) return p[2].length===4?`${p[2]}-${p[1]}-${p[0]}`:`20${p[2]}-${p[1]}-${p[0]}`
    }
    return s
  }

  const ignorarC6 = ['pagamento fatura','estorno tarifa','inclusao de pagamento','anuidade diferenciada','credito concedido']

  const parsers={
    // Nubank: date,title,amount  (comma, quoted fields, YYYY-MM-DD)
    nubank: ls=>ls.slice(1).filter(l=>l.trim()).map(l=>{
      const c=splitCSV(l)
      const v=parseFloat((c[2]||'0').replace(/[^0-9.\-]/g,''))||0
      return{data:c[0]?.trim(),desc:c[1]?.trim(),valor:Math.abs(v),banco:'Nubank'}
    }).filter(r=>r.desc&&r.valor>0),

    // XP: Data;Estabelecimento;Portador;Valor;Parcela  (semicolon, BOM UTF-8)
    // Valor format: "R$ 123,66"
    xp: ls=>ls.slice(1).filter(l=>l.trim()).map(l=>{
      const c=l.replace(/\r/,'').split(';')
      const desc=(c[1]||'').trim()
      if(!desc||desc==='Estabelecimento') return null
      const valStr=(c[3]||'').replace('R$','').replace(/\s/g,'').replace(/\./g,'').replace(',','.')
      const v=parseFloat(valStr)||0
      if(v<=0) return null
      return{data:parseData(c[0]),desc,valor:v,banco:'XP'}
    }).filter(Boolean),

    // C6: Data de Compra;Nome;Final;Categoria;Descrição;Parcela;USD;Cotação;Valor(R$)
    // Valor is float in cols[8], negative = payments (ignore)
    c6: ls=>ls.slice(1).filter(l=>l.trim()).map(l=>{
      const c=l.replace(/\r/,'').split(';')
      if(c.length<9) return null
      const desc=(c[4]||'').trim()
      const descL=desc.toLowerCase()
      if(!desc||ignorarC6.some(ig=>descL.includes(ig))) return null
      const v=parseFloat((c[8]||'0').replace(',','.'))||0
      if(v<=0) return null
      return{data:parseData(c[0]),desc,valor:v,banco:'C6'}
    }).filter(Boolean),

    // Mercado Pago CSV (if ever available): generic fallback
    mercadopago: ls=>ls.slice(1).filter(l=>l.trim()).map(l=>{
      const c=splitCSV(l)
      const v=parseFloat((c[c.length-1]||'0').replace(/[^0-9.,\-]/g,'').replace(',','.'))||0
      return{data:c[0]?.trim(),desc:(c[2]||c[1]||'').trim(),valor:Math.abs(v),banco:'Mercado Pago'}
    }).filter(r=>r.desc&&r.valor>0),
  }
  return ((parsers[banco]||parsers.nubank)(ls)).map(r=>({...r,categoria:categorizarAuto(r.desc)}))
}

function detectarBanco(texto,nome){
  const t=(nome+texto.slice(0,400)).toLowerCase()
  const nLower=nome.toLowerCase()
  // By filename
  if(nLower.includes('nubank')) return 'nubank'
  if(nLower.includes('c6')||nLower.includes('c6bank')) return 'c6'
  if(nLower.match(/fatura[_-]?\d{4}/)) return 'xp'  // XP filename pattern: Fatura_YYYY or Fatura2026
  // By content
  if(t.includes('nubank')) return 'nubank'
  if(t.includes('estabelecimento;portador;valor;parcela')||t.includes('estabelecimento')) return 'xp'
  if(t.includes('data de compra;nome no cart')||t.includes('cotacao')||t.includes('cotação')) return 'c6'
  if(t.includes('mercado pago')||t.includes('mercadopago')) return 'mercadopago'
  // By CSV structure: check first line separator
  const firstLine=texto.split('\n')[0]||''
  if(firstLine.includes(';')) {
    if(firstLine.includes('Estabelecimento')) return 'xp'
    if(firstLine.includes('Descri')) return 'c6'
  }
  return 'nubank'
}

function mesLabel(data){
  if(!data) return 'Desconhecido'
  const d=data.includes('/')? data.split('/').reverse().join('-'):data
  try{const dt=new Date(d+'T00:00:00');return `${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`}
  catch{return data.slice(0,7)}
}

function similaridade(a,b){
  const sa=(a||'').toLowerCase().replace(/\s+/g,'').slice(0,20)
  const sb=(b||'').toLowerCase().replace(/\s+/g,'').slice(0,20)
  if(sa===sb) return 1
  let m=0; for(let i=0;i<Math.min(sa.length,sb.length);i++) if(sa[i]===sb[i]) m++
  return m/Math.max(sa.length,sb.length,1)
}

function detectarDuplicatas(lista){
  const dups=[]
  for(let i=0;i<lista.length;i++) for(let j=i+1;j<lista.length;j++){
    const a=lista[i],b=lista[j]
    if(mesLabel(a.data)===mesLabel(b.data)&&Math.abs(Number(a.valor)-Number(b.valor))<0.01&&similaridade(a.desc,b.desc)>0.75)
      if(!dups.find(d=>(d.i===i&&d.j===j)||(d.i===j&&d.j===i)))
        dups.push({i,j,motivo:`Mesmo valor (${fmt(a.valor)}), descrição similar, mesmo mês`})
  }
  return dups
}

async function extrairTextoPDF(file){
  if(typeof pdfjsLib==='undefined'){toast('PDF.js carregando, tente novamente.',false);return''}
  const buf=await file.arrayBuffer()
  const pdf=await pdfjsLib.getDocument({data:buf}).promise
  let txt=''
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i)
    const ct=await pg.getTextContent()
    const items=ct.items.sort((a,b)=>{const dy=Math.round(b.transform[5])-Math.round(a.transform[5]);return dy!==0?dy:a.transform[4]-b.transform[4]})
    let cy=null,cl=[]
    for(const it of items){
      const y=Math.round(it.transform[5])
      if(cy===null)cy=y
      if(Math.abs(y-cy)>3){txt+=cl.join(' ')+'\n';cl=[];cy=y}
      cl.push(it.str.trim())
    }
    if(cl.length)txt+=cl.join(' ')+'\n'
  }
  return txt
}

function parsarPDF(texto,banco){
  const linhas = texto.split('\n').map(l=>l.trim()).filter(l=>l.length>0)
  const lncs = []

  // ── Mercado Pago parser ──────────────────────────────────────────────────
  // Formato real da fatura MP:
  // "DD/MM DESCRIÇÃO [Parcela X de Y] R$ VALOR,XX"
  // Cada página repete "Total R$ X.XXX,XX" no final — ignorar
  // "Pagamento da fatura" deve ser ignorado (crédito, não gasto)
  // Datas são DD/MM sem ano — inferir pelo contexto da fatura

  if(banco==='mercadopago') {
    // Regex: linha começa com DD/MM, tem descrição, termina com R$ VALOR
    const reLinha = /^(\d{2}\/\d{2})\s+(.+?)\s+R\$\s*([\d.,]+)\s*$/
    // Palavras-chave para ignorar (pagamentos, totais, cabeçalhos)
    const ignorar = [
      'pagamento da fatura', 'total', 'data movimentações',
      'detalhes de consumo', 'cartão visa', 'movimentações na fatura',
      'vencimento', 'emitido em'
    ]

    for(const linha of linhas) {
      const m = reLinha.exec(linha)
      if(!m) continue

      const [, dmData, desc, valorStr] = m
      const descLower = desc.toLowerCase()

      // Ignorar pagamentos e linhas de cabeçalho
      if(ignorar.some(ig => descLower.includes(ig))) continue

      // Ignorar linhas que são só o total repetido (valor muito alto)
      const valor = parseFloat(valorStr.replace(/\./g,'').replace(',','.'))
      if(!valor || valor <= 0) continue

      // Inferir ano: se mês > mês atual, provavelmente ano anterior
      const partesDM = dmData.split('/')
      const dia = partesDM[0], mes = partesDM[1]
      const agora = new Date()
      const mesAtual = agora.getMonth() + 1
      const anoAtual = agora.getFullYear()
      const mesNum = parseInt(mes)
      const ano = mesNum > mesAtual + 1 ? anoAtual - 1 : anoAtual
      const data = `${ano}-${mes}-${dia}`

      // Limpar descrição: remover "Parcela X de Y" para categorização
      const descLimpa = desc.replace(/Parcela\s+\d+\s+de\s+\d+/gi,'').replace(/\s+/g,' ').trim()

      lncs.push({
        data,
        desc: desc.substring(0,80),
        valor,
        categoria: categorizarAuto(descLimpa),
        banco: 'Mercado Pago'
      })
    }
    return lncs
  }

  // ── Parser genérico para outros PDFs ────────────────────────────────────
  // Tenta detectar linhas com DD/MM[/AAAA] + descrição + valor
  const reGen1 = /^(\d{2}\/\d{2}\/\d{2,4})\s+(.+?)\s+R\$\s*([\d.,]+)\s*$/
  const reGen2 = /^(\d{2}\/\d{2})\s+(.+?)\s+R\$\s*([\d.,]+)\s*$/
  const ignorarGen = ['total','data movimentações','detalhes de consumo']

  for(const linha of linhas) {
    const m = reGen1.exec(linha) || reGen2.exec(linha)
    if(!m) continue
    const descLower = (m[2]||'').toLowerCase()
    if(ignorarGen.some(ig=>descLower.includes(ig))) continue
    const valor = parseFloat((m[3]||'0').replace(/\./g,'').replace(',','.'))
    if(!valor||valor<=0) continue

    let data = m[1]
    if(data.includes('/') && data.split('/').length===2){
      const p=data.split('/'),mes=parseInt(p[1]),agora=new Date()
      const ano=mes>agora.getMonth()+2?agora.getFullYear()-1:agora.getFullYear()
      data=`${ano}-${p[1]}-${p[0]}`
    } else if(data.includes('/')) {
      const p=data.split('/')
      data=p.length===3?(p[2].length===2?`20${p[2]}-${p[1]}-${p[0]}`:`${p[2]}-${p[1]}-${p[0]}`):data
    }

    lncs.push({data, desc:m[2].trim().substring(0,80), valor, categoria:categorizarAuto(m[2]), banco:'PDF'})
  }
  return lncs
}

window.importarArquivos = async (files) => {
  const st=document.getElementById('import-status')
  if(st)st.innerHTML='<div class="alert a-info" style="margin-top:8px">Processando...</div>'
  let novos=0,dups=0,erros=[]
  for(const file of files){
    try{
      const isPDF=file.name.toLowerCase().endsWith('.pdf')||file.type==='application/pdf'
      const bCfg=document.getElementById('banco-sel').value
      let rows=[]
      if(isPDF){
        const txt=await extrairTextoPDF(file)
        if(!txt){erros.push(file.name+': sem texto');continue}
        const b=bCfg==='auto'?detectarBanco(txt,file.name):bCfg
        rows=parsarPDF(txt,b)
        if(!rows.length)erros.push(file.name+': nenhum lançamento encontrado (verifique se o PDF tem texto selecionável)')
      }else{
        const txt=await file.text()
        const b=bCfg==='auto'?detectarBanco(txt,file.name):bCfg
        rows=parsarCSV(txt,b)
      }
      // Normaliza datas de parcelas antigas para o mês de cobrança
      if(rows.length>0){
        const datas=rows.map(r=>r.data).filter(Boolean).sort()
        const dataMax=datas[datas.length-1]
        const mesCobranca=dataMax?dataMax.slice(0,7):null
        if(mesCobranca){
          const [anoC,mesC]=mesCobranca.split('-').map(Number)
          const limDate=new Date(anoC,mesC-1-2,1)
          const limStr=limDate.getFullYear()+'-'+String(limDate.getMonth()+1).padStart(2,'0')
          rows=rows.map(r=>{
            const mesTx=r.data?r.data.slice(0,7):''
            if(mesTx&&mesTx<limStr) return{...r,dataOriginal:r.data,data:mesCobranca+'-01'}
            return r
          })
        }
      }
      for(const r of rows){
        const dup=analiseState.lancamentos.some(e=>mesLabel(e.data)===mesLabel(r.data)&&Math.abs(Number(e.valor)-Number(r.valor))<0.01&&similaridade(e.desc,r.desc)>0.85)
        if(!dup){analiseState.lancamentos.push(r);novos++}else dups++
      }
    }catch(e){erros.push(file.name+': '+e.message)}
  }
  analiseState.filtroMes='todos';analiseState.filtroBanco='todos';analiseState.filtroCat='todas'
  let msg=novos>0?`<div class="alert a-ok" style="margin-top:8px">${novos} lançamentos importados.${dups>0?' '+dups+' duplicatas ignoradas.':''}</div>`:'<div class="alert a-warn" style="margin-top:8px">Nenhum lançamento novo encontrado.</div>'
  if(erros.length)msg+=`<div class="alert a-danger" style="margin-top:6px">${erros.join('<br>')}</div>`
  if(st)st.innerHTML=msg
  if(novos>0)document.getElementById('analise-corpo').innerHTML=renderAnaliseConteudo()
}

window.setFiltroAnalise=(campo,valor)=>{analiseState[campo]=valor;document.getElementById('analise-corpo').innerHTML=renderAnaliseConteudo()}
window.recategorizar=(idx,cat)=>{if(analiseState.lancamentos[idx]){analiseState.lancamentos[idx].categoria=cat;toast('Categoria atualizada!')}}
window.removerLancamento=(idx)=>{analiseState.lancamentos.splice(idx,1);document.getElementById('analise-corpo').innerHTML=renderAnaliseConteudo()}
window.limparDuplicatas=()=>{document.getElementById('analise-corpo').innerHTML=renderAnaliseConteudo()}
window.limparDados=()=>{
  if(!confirm('Remover todos os lançamentos?'))return
  analiseState={lancamentos:[],filtroMes:'todos',filtroBanco:'todos',filtroCat:'todas',chartMes:null,chartCat:null}
  document.getElementById('analise-corpo').innerHTML='<div class="alert a-info">Dados limpos.</div>'
}
window.salvarNoFirebase=async()=>{
  if(!analiseState.lancamentos.length){toast('Nenhum lançamento.',false);return}
  try{await Promise.all(analiseState.lancamentos.map(l=>addDoc(col('extrato'),l)));toast(analiseState.lancamentos.length+' lançamentos salvos!')}
  catch(e){toast('Erro ao salvar.',false)}
}
